name: Build TWA APK
on:
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install Bubblewrap
      run: npm install -g @bubblewrap/cli

    - name: Init Bubblewrap config
      run: |
        bubblewrap init \
          --manifest https://stirring-snickerdoodle-5c5a68.netlify.app/manifest.json \
          --directory twa-app
      env:
        ANDROID_HOME: /usr/local/lib/android/sdk

    - name: Generate keystore
      run: |
        keytool -genkey -v \
          -keystore twa-app/android.keystore \
          -alias tripsplit \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass tripsplit2024 \
          -keypass tripsplit2024 \
          -dname "CN=HostYaya,O=TripSplit,C=TW"

    - name: Build APK
      run: |
        cd twa-app
        bubblewrap build \
          --keystoreFile android.keystore \
          --keystorePassword tripsplit2024 \
          --keyAlias tripsplit \
          --keyPassword tripsplit2024
      env:
        ANDROID_HOME: /usr/local/lib/android/sdk

    - uses: actions/upload-artifact@v4
      with:
        name: tripsplit-apk
        path: twa-app/*.apk
